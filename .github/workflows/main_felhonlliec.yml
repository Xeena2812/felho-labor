# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - felhonlliec

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/main_felhonlliec.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      - name: dotnet restore
        run: dotnet restore backend/PhotoAsAService.Api/PhotoAsAService.Api.csproj

      - name: Build with dotnet
        run: dotnet build backend/PhotoAsAService.Api/PhotoAsAService.Api.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish backend/PhotoAsAService.Api/PhotoAsAService.Api.csproj -c Release --no-build -o ${{ github.workspace }}/backend-publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ${{ github.workspace }}/backend-publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: ${{ github.workspace }}/backend-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_598FC7E9F908499397C34D978F103119 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CE9AC49B553148F494673E9396BF2087 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BC28680C0C2540F784C1667082F2053D }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "felhonlliec"
          slot-name: "Production"
          package: ${{ github.workspace }}/backend-app
