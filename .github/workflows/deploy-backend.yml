name: Deploy Backend

on:
    push:
        branches: ["main"]
        paths:
            - "backend/**"
            - ".github/workflows/deploy-backend.yml"
    workflow_dispatch:

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0.x"

            - name: Restore
              run: dotnet restore backend/PhotoAsAService.Api/PhotoAsAService.Api.csproj

            - name: Build
              run: dotnet build backend/PhotoAsAService.Api/PhotoAsAService.Api.csproj --configuration Release --no-restore

            - name: Publish
              run: dotnet publish backend/PhotoAsAService.Api/PhotoAsAService.Api.csproj --configuration Release --no-build --output ${{ github.workspace }}/backend-publish

            - name: Deploy to Azure Web App
              uses: azure/webapps-deploy@v3
              with:
                  app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
                  publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
                  package: ${{ github.workspace }}/backend-publish
